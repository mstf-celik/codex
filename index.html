<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Page</title>
<style>
  body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f4; }
  .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  h1 { text-align: center; color: #333; }
  p { line-height: 1.5; }
  button { padding: 10px 20px; margin-top: 10px; border: none; border-radius: 4px; background: #008cba; color: white; cursor: pointer; }
  button:hover { background: #005f5f; }
</style>
</head>
<body>
  <div class="container">
    <h1>Hello, World!</h1>
    <p>This is a simple web page created as a demonstration.</p>
    <button id="actionBtn">Click me</button>
  </div>
  <script>
    document.getElementById('actionBtn').addEventListener('click', function() {
      alert('Button clicked!');
    });
  </script>
</body>
</html>
